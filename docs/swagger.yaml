paths:
  /api/jobs:
    get:
      description: Get jobs with optional filters
      parameters:
      - description: Filter by status (pending, running, completed, failed)
        in: query
        name: status
        type: string
      - description: Filter by website ID
        in: query
        name: website_id
        type: integer
      - default: 50
        description: Number of results
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/github_com_awang-karisma_trustpilot-scraper_internal_api_dto.JobListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/github_com_awang-karisma_trustpilot-scraper_internal_api_dto.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/github_com_awang-karisma_trustpilot-scraper_internal_api_dto.ErrorResponse'
      summary: List jobs
      tags:
      - jobs
  /api/jobs/{id}:
    get:
      description: Get a job by ID
      parameters:
